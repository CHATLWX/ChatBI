<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enterprise ChatBI</title>
  <style>
    :root{color-scheme:light;--ink:#172033;--muted:#657086;--line:#dfe4ec;--brand:#3558d4;--panel:#fff;--bg:#f4f6fa}
    *{box-sizing:border-box}body{margin:0;font:15px/1.6 system-ui,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}
    header{background:#18223b;color:#fff;padding:18px 28px}header h1{margin:0;font-size:21px}header small{opacity:.7}
    main{max-width:1180px;margin:24px auto;padding:0 20px}.grid{display:grid;grid-template-columns:1fr 340px;gap:18px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:0 3px 12px #1720330a}
    textarea{width:100%;min-height:96px;padding:12px;border:1px solid var(--line);border-radius:8px;resize:vertical;font:inherit}
    button{border:0;border-radius:8px;background:var(--brand);color:#fff;padding:10px 18px;font-weight:600;cursor:pointer}button:disabled{opacity:.5}
    .examples button{display:block;width:100%;margin:8px 0;text-align:left;background:#eef1fb;color:#293d8f;font-weight:400}
    #status{color:var(--muted);margin:12px 0}.event{border-left:3px solid #91a2e8;padding:7px 10px;margin:7px 0;background:#f8f9fd}
    pre{white-space:pre-wrap;overflow:auto;background:#101728;color:#dce4ff;padding:14px;border-radius:8px}table{border-collapse:collapse;width:100%}th,td{border:1px solid var(--line);padding:7px;text-align:left}th{background:#f3f5f9}
    .report{white-space:pre-wrap}.error{color:#a32121;background:#fff1f1;padding:10px;border-radius:8px}@media(max-width:850px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><h1>企业级制造业财务 ChatBI</h1><small>千问 · Milvus · Schema Linking · 指标 RAG · Plan-and-Execute</small></header>
<main><div class="grid">
  <section class="card">
    <textarea id="question" placeholder="例如：最近三个月利润为什么下降？"></textarea>
    <p><button id="ask">开始分析</button></p><div id="status"></div><div id="events"></div><div id="result"></div>
  </section>
  <aside class="card examples"><strong>示例问题</strong>
    <button>查询上个月的销售额、销售成本及毛利</button>
    <button>最近三个月利润为什么下降？</button>
    <button>按产品线统计最近六个月收入和毛利率</button>
    <button>欧洲和北美最近三个月收入趋势有何不同？</button>
  </aside>
</div></main>
<script>
const q=document.querySelector('#question'),ask=document.querySelector('#ask'),events=document.querySelector('#events'),result=document.querySelector('#result'),status=document.querySelector('#status');
document.querySelectorAll('.examples button').forEach(b=>b.onclick=()=>q.value=b.textContent);
function table(rows){if(!rows?.length)return '<p>结果为空</p>';const cols=Object.keys(rows[0]);return `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function render(data){if(data.mode==='agent'){const report=data.report?.markdown||data.report?.executive_summary||'';result.innerHTML=`<h3>分析报告</h3><div class="report">${report}</div><h3>执行计划</h3><pre>${JSON.stringify(data.plan,null,2)}</pre>`}else{result.innerHTML=`<h3>查询结果</h3>${table(data.rows)}<h3>SQL</h3><pre>${data.sql||''}</pre>`}}
ask.onclick=async()=>{if(!q.value.trim())return;ask.disabled=true;events.innerHTML='';result.innerHTML='';status.textContent='连接服务中…';
 try{const res=await fetch('/api/v1/query/stream',{method:'POST',headers:{'Content-Type':'application/json','x-user-id':'web_user','x-user-role':'analyst'},body:JSON.stringify({question:q.value})});if(!res.ok)throw new Error(await res.text());const reader=res.body.getReader(),decoder=new TextDecoder();let buffer='';while(true){const {value,done}=await reader.read();if(done)break;buffer+=decoder.decode(value,{stream:true});const chunks=buffer.split('\n\n');buffer=chunks.pop();for(const chunk of chunks){let type='message',payload={};for(const line of chunk.split('\n')){if(line.startsWith('event:'))type=line.slice(6).trim();if(line.startsWith('data:'))payload=JSON.parse(line.slice(5));}if(type==='status'){status.textContent=payload.message}else if(type==='sql_delta'){status.textContent='正在生成 SQL…'}else if(type==='step'){events.insertAdjacentHTML('beforeend',`<div class="event">${payload.step_name}: ${payload.status||''}</div>`)}else if(type==='result'){render(payload)}else if(type==='error'){result.innerHTML=`<div class="error">${payload.error||'查询失败'}</div>`}}}status.textContent='完成';}catch(e){result.innerHTML=`<div class="error">${e.message}</div>`}finally{ask.disabled=false}}
</script>
</body></html>
